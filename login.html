<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Attendance Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: center; }
        .login-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 18px;
            padding: 44px 40px;
            width: min(90%, 400px);
            box-shadow: 0 24px 60px rgba(91,94,244,0.25);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .login-card p {
            color: rgba(255,255,255,0.50);
            font-size: 0.85rem;
            margin-top: -10px;
        }
        .login-card label {
            color: rgba(255,255,255,0.70);
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
            display: block;
        }
        .login-card input {
            width: 100%;
            margin: 0;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            margin-top: 4px;
        }
        .login-error {
            color: #fb7185;
            font-size: 0.82rem;
            display: none;
            background: rgba(244,63,94,0.12);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(244,63,94,0.25);
        }
        .login-hint {
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div>
            <h2>👋 Welcome back</h2>
            <p>Sign in to manage attendance</p>
        </div>
        <div>
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
        </div>
        <div>
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
                onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div class="login-error" id="loginError">❌ Wrong username or password</div>
        <button onclick="doLogin()">Sign In</button>
        <p class="login-hint">Demo: admin / admin123</p>
    </div>
    <script>
        if (localStorage.getItem("ams_session") === "true") {
            window.location.href = "index.html";
        }
        const VALID_USER = "admin";
        const VALID_PASS = "admin123";

        function doLogin() {
            const user = document.getElementById("loginUser").value.trim();
            const pass = document.getElementById("loginPass").value;
            const err  = document.getElementById("loginError");

            if (user === VALID_USER && pass === VALID_PASS) {
                // Save session flag in localStorage
                localStorage.setItem("ams_session", "true");
                window.location.href = "index.html";
            } else {
                err.style.display = "block";
                // Shake animation on wrong credentials
                document.querySelector(".login-card").style.animation = "none";
            }
        }
    </script>
</body>
</html>
